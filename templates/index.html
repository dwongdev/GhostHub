<!DOCTYPE html>
<html lang="en" data-theme="{{ initial_theme|default('dark') }}" data-layout="{{ initial_layout|default('streaming') }}"
    {% for key, val in (initial_features or {}).items() %} data-feature-{{ key }}="{{ val|lower }}" {% endfor %}>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostHub</title>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- Thumbnail Processing Indicators for Pi Optimization -->
    <link rel="stylesheet" href="/static/css/thumbnail-processing.css">

    <!-- HLS.js for GhostStream transcoded playback (non-Safari browsers) -->
    <script src="/static/js/libs/hls.min.js"></script>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2d3250">
    <meta name="description" content="A lightweight, modular media server for browsing, streaming, and managing your library across GhostHub layouts">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GhostHub">

    <!-- PWA Icons -->
    <link rel="icon" href="/static/icons/Ghosthub1024.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/icons/Ghosthub180.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
</head>

<body>
    <header class="gh-header" role="banner">
        <!-- Left: Status -->
        <div class="gh-header__left">
            <!-- Sync status removed -->
        </div>

        <!-- Center: Brand -->
        <div class="gh-header__center">
            <a href="/" class="gh-header__brand">
                <img src="/static/icons/Ghosthub192.png" alt="" class="gh-header__logo">
                <span class="gh-header__title">GhostHub</span>
            </a>
        </div>

        <!-- Right: Actions -->
        <div class="gh-header__right">
            <!-- Admin Lock -->
            <button id="adminLockBtn" class="gh-header__btn" aria-label="Claim Admin Role" title="Admin" data-gh-tooltip="Claim Admin Role" data-gh-tooltip-position="bottom">
                <!-- SVG icon will be dynamically inserted by JS -->
            </button>

            <!-- Settings button (visible to everyone) -->
            <button id="config-toggle-btn" class="gh-header__btn" aria-label="Settings" title="Settings" data-gh-tooltip="Settings" data-gh-tooltip-position="bottom">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>

            <button id="tunnel-toggle-btn" class="gh-header__btn admin-feature" aria-label="Remote Access"
                title="Remote Access" data-gh-tooltip="Remote Access" data-gh-tooltip-position="bottom">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                    <path d="M2 7.5h20" opacity="0.4" />
                    <path d="M2 16.5h20" opacity="0.4" />
                </svg>
            </button>

            <!-- Search button -->
            <button id="search-toggle-btn" class="gh-header__btn" aria-label="Search" title="Search" data-feature-search data-gh-tooltip="Search" data-gh-tooltip-position="bottom">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </button>

            <!-- Sync button -->
            <button id="sync-toggle-btn" class="gh-header__btn gh-header__sync-btn" aria-label="Toggle sync mode" title="Toggle Sync Mode" data-gh-tooltip="Toggle Sync Mode" data-gh-tooltip-position="bottom">Sync</button>
        </div>
    </header>

    <!-- Search Dropdown (hidden by default) -->
    <div class="gh-search hidden" id="search-dropdown">
        <div class="gh-search__input-wrap">
            <span class="gh-search__icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </span>
            <input type="text" class="gh-input gh-search__input" id="global-search-input" placeholder="Search media files..."
                autocomplete="off">
        </div>
        <div class="gh-search__results" id="search-results-dropdown"></div>
    </div>
    <main role="main">
    <!-- Media Viewer -->
    <div id="media-viewer" class="hidden">
        <!-- Loading Spinner -->
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>

        <!-- Media elements will be dynamically inserted here -->

        <!-- Media Info Overlay -->
        <div class="media-info-overlay">
            <div class="filename"></div>
            <div class="metadata">
                <span class="dimensions">1920 x 1080</span>
                <span class="size">2.4 MB</span>
                <span class="date">2023-04-19</span>
            </div>
        </div>

        <!-- Back Button -->
        <a href="#" id="permanent-gh-back-btn" class="btn btn--icon gh-back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            <span id="gh-back-btn-spinner" class="hidden"></span>
        </a>


    </div>

    <!-- Main Browser Container -->
    <div class="container" id="browser-container" tabindex="-1">
        <h1 class="hidden-title">GhostHub</h1>

        <!-- Categories Section -->
        <div id="categories-section">


            <!-- Filter Bar -->
            <div class="category-filter-bar" role="navigation" aria-label="Media filters">
                <div class="filter-buttons">
                    <button class="pill pill--filter pill--active" data-filter="all">All</button>
                    <button class="pill pill--filter" data-filter="video">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" />
                            <line x1="7" y1="2" x2="7" y2="22" />
                            <line x1="17" y1="2" x2="17" y2="22" />
                            <line x1="2" y1="12" x2="22" y2="12" />
                            <line x1="2" y1="7" x2="7" y2="7" />
                            <line x1="2" y1="17" x2="7" y2="17" />
                            <line x1="17" y1="17" x2="22" y2="17" />
                            <line x1="17" y1="7" x2="22" y2="7" />
                        </svg>
                        Videos
                    </button>
                    <button class="pill pill--filter" data-filter="image">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                        Photos
                    </button>
                </div>
                <div class="category-filter-meta">
                    <div class="category-active-filter">
                        <span class="pill pill--breadcrumb hidden" data-category-filter-pill></span>
                    </div>
                    <div class="category-count" id="categoryCount"></div>
                </div>
            </div>

            <div class="grid-container" id="grid-container">
                <!-- Items will be loaded here -->
            </div>

            <!-- Load More Button -->
            <div class="load-more-container hidden" id="loadMoreContainer">
                <button class="btn btn--secondary load-more-btn" id="loadMoreBtn">Load More</button>
            </div>
        </div>
    </div>
    </main>



    <!-- Chat Container -->
    <div class="chat-container collapsed" id="chat-container">
        <div class="chat-header" id="chat-header">
            <div class="latest-message" id="latest-message">Chat</div>
            <div class="chat-controls">
                <button class="chat-toggle" id="chat-toggle">
                    <!-- Removed SVG as we're using CSS arrow now -->
                </button>
                <div class="chat-unread-badge"></div>
            </div>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="chat-messages" id="chat-messages" aria-live="polite">
                <!-- Chat messages will be loaded here -->
            </div>
            <form class="chat-form" id="chat-form">
                <input type="text" class="chat-input" id="chat-input" placeholder="Type a message...">
                <button type="submit" class="chat-send" id="chat-send">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/libs/SocketIoMin.js"></script>
    <script type="module" src="/static/js/main.js"></script>
    <script type="module" src="/static/js/pwa-installer.js"></script>
    <!-- Configuration Modal -->
    <div id="config-modal" class="modal hidden">
        <div class="modal__content">
            <div class="modal__header">
                <h2 class="modal__title">Settings</h2>
                <button id="config-modal-close-btn" class="btn btn--icon modal__close" aria-label="Close settings">&times;</button>
            </div>
            <div class="modal__body" id="config-modal-body">
                <!-- Configuration form will be built by JS here -->
                <p>Loading settings...</p>
            </div>
            <div class="modal__footer">
                <button id="config-modal-save-btn" class="btn btn--primary">Save Changes</button>
                <button id="config-modal-cancel-btn" class="btn btn--secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Admin Interface Modal -->
    <div id="admin-modal" class="modal hidden">
        <div class="modal__content">
            <div class="modal__header">
                <h2 class="modal__title">Admin Dashboard</h2>
                <button id="admin-modal-close-btn" class="btn btn--icon modal__close" aria-label="Close admin dashboard">&times;</button>
            </div>
            <div class="modal__body" id="admin-modal-body">
                <div class="admin-container">
                    <!-- Users Admin Content -->
                    <div id="users-content" class="admin-content admin-content--visible">
                        <h2>User Management</h2>
                        <div class="admin-section">
                            <h3>Connected Users</h3>
                            <div id="users-list">
                                <p>No users currently connected.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tunnel Management Modal -->
    <div id="tunnel-modal" class="modal hidden">
        <div class="modal__content tunnel-modal-content">
            <div class="modal__header">
                <h2 class="modal__title">Remote Access</h2>
                <button id="tunnel-modal-close-btn" class="btn btn--icon modal__close" aria-label="Close remote access">&times;</button>
            </div>
            <div class="modal__body tunnel-modal-body" id="tunnel-modal-body">
                <div class="alert alert-warning tunnel-warning">
                    Requires Ethernet connection. Wi-Fi AP mode won't work.
                </div>
                <div class="form-group tunnel-form-group--tight">
                    <label for="tunnel-provider-select" class="tunnel-label">Access
                        Method:</label>
                    <select id="tunnel-provider-select" class="gh-select tunnel-provider-select" name="TUNNEL_PROVIDER">
                        <option value="none">None</option>
                        <option value="cloudflare">Cloudflare (Easiest)</option>
                        <option value="pinggy">Pinggy</option>
                        <option value="mesh">Secure Mesh (VPN)</option>
                    </select>
                </div>
                <div id="pinggy-token-group" class="form-group tunnel-form-group--tight hidden">
                    <label for="pinggy-access-token-input" class="tunnel-label">Pinggy Token:</label>
                    <input type="password" id="pinggy-access-token-input" name="PINGGY_ACCESS_TOKEN"
                        class="gh-input tunnel-input" placeholder="Enter token">
                </div>
                <div class="form-group tunnel-form-group--tight">
                    <label class="tunnel-checkbox-label">
                        <input type="checkbox" id="tunnel-auto-start" name="TUNNEL_AUTO_START">
                        Start tunnel on boot
                    </label>
                </div>
                <div class="form-group tunnel-form-group--tight hidden">
                    <label for="tunnel-local-port-input" class="tunnel-label">Port:</label>
                    <input type="number" id="tunnel-local-port-input" name="TUNNEL_LOCAL_PORT" value="5000"
                        class="gh-input tunnel-input">
                </div>
                <div id="tunnel-status-display" class="tunnel-status">
                    Status: Not Active
                </div>

                <!-- Secure Mesh Section -->
                <div id="mesh-info-container" class="hidden">
                    <div id="mesh-instructions">
                        <!-- Tailscale setup instructions inserted by JS -->
                    </div>

                    <!-- Connected Devices -->
                    <div id="hs-nodes-section" class="tunnel-nodes-section">
                        <label class="tunnel-section-label">Connected
                            Devices:</label>
                        <ul id="hs-nodes-list" class="tunnel-nodes-list">
                            <li class="tunnel-empty-state">No devices connected.</li>
                        </ul>
                    </div>

                    <!-- Hidden elements for backwards compatibility -->
                    <div class="tunnel-hidden-compat">
                        <button id="wg-copy-config-btn"></button>
                        <a id="wg-download-config-btn" href="#"></a>
                    </div>
                </div>
            </div>
            <div class="modal__footer tunnel-modal-footer">
                <button id="tunnel-modal-start-btn" class="btn btn--primary tunnel-modal-action">Start</button>
                <button id="tunnel-modal-stop-btn" class="btn btn--danger tunnel-modal-action">Stop</button>
                <button id="tunnel-modal-save-settings-btn" class="btn btn--secondary tunnel-modal-action">Save</button>
            </div>
        </div>
    </div>

</body>

</html>
