[pytest]
# GhostHub Pytest Configuration

# Register custom marks to avoid warnings
markers =
    unit: Unit tests - test individual functions/methods in isolation
    integration: Integration tests - test multiple components working together
    slow: Slow tests - tests that take >5 seconds to run
    e2e: End-to-end tests - full workflow tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v --tb=short --strict-markers

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests
